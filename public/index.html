<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AugustDuarte · Files</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b11;
      --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.09);
      --accent: #7c3aed;
      --accent2: #2563eb;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,.12);
      --danger-border: rgba(239,68,68,.3);
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: rgba(11,11,17,.85);
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: .85rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .site-name {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.02em;
      flex: 1;
    }

    .site-name span {
      font-size: .75rem;
      font-weight: 400;
      color: var(--muted);
      margin-left: .35rem;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: .8rem;
      padding: .4rem .85rem;
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .btn-logout:hover, .btn-logout:active { color: var(--text); border-color: rgba(255,255,255,.2); }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* ── Upload zone ─────────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: var(--surface);
      margin-bottom: 1.75rem;
      -webkit-tap-highlight-color: transparent;
    }

    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124,58,237,.08);
    }

    .upload-icon { font-size: 2.5rem; margin-bottom: .65rem; }

    .upload-zone h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: .3rem;
    }

    .upload-zone p {
      font-size: .82rem;
      color: var(--muted);
    }

    .btn-browse {
      display: inline-block;
      margin-top: 1rem;
      padding: .55rem 1.25rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #fileInput { display: none; }

    /* ── Progress bar ────────────────────────────────────────────────────── */
    .progress-wrap {
      display: none;
      margin-bottom: 1.25rem;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar-bg {
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width .15s ease;
    }

    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .4rem;
      text-align: center;
    }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(30,30,42,.95);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      padding: .65rem 1.25rem;
      font-size: .88rem;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all .2s;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Section header ──────────────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .85rem;
    }

    .section-title {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    #fileCount {
      font-size: .78rem;
      color: var(--muted);
    }

    /* ── File list ───────────────────────────────────────────────────────── */
    #fileList {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .file-item {
      display: grid;
      grid-template-columns: 2.5rem 1fr auto;
      align-items: center;
      gap: .75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      transition: background .15s;
    }

    .file-item:hover { background: rgba(255,255,255,.06); }

    .file-icon {
      font-size: 1.5rem;
      text-align: center;
      line-height: 1;
    }

    .file-info { min-width: 0; }

    .file-name {
      font-size: .9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .file-meta {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .15rem;
    }

    .file-actions {
      display: flex;
      gap: .4rem;
      flex-shrink: 0;
    }

    .btn-action {
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: .78rem;
      padding: .4rem .75rem;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: .3rem;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      min-height: 36px;
    }

    .btn-action:hover { color: var(--text); border-color: rgba(255,255,255,.22); }

    .btn-download:hover { border-color: var(--accent); color: var(--accent); }

    .btn-delete:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--danger-bg);
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .9rem; }

    /* ── Mobile tweaks ───────────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .file-item {
        grid-template-columns: 2rem 1fr;
        grid-template-rows: auto auto;
      }

      .file-icon { font-size: 1.25rem; }

      .file-actions {
        grid-column: 1 / -1;
        padding-top: .25rem;
        border-top: 1px solid var(--border);
        margin-top: .25rem;
      }

      .btn-action {
        flex: 1;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo-icon">📁</div>
      <div class="site-name">AugustDuarte <span>augustduarte.com</span></div>
      <form method="POST" action="/api/logout">
        <button class="btn-logout" type="submit">Sign out</button>
      </form>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Upload zone -->
    <div class="upload-zone" id="dropZone">
      <div class="upload-icon">☁️</div>
      <h2>Drop files here</h2>
      <p>or tap to browse from your device</p>
      <button class="btn-browse" type="button" id="browseBtn">Choose Files</button>
      <input type="file" id="fileInput" multiple />
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <p class="progress-label" id="progressLabel">Uploading…</p>
    </div>

    <!-- File list -->
    <div class="section-header">
      <span class="section-title">Files</span>
      <span id="fileCount"></span>
    </div>

    <div id="fileList"></div>
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ── Utilities ─────────────────────────────────────────────────────────────

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString();
    }

    function fileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const map = {
        jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️', svg: '🖼️', heic: '🖼️',
        mp4: '🎬', mov: '🎬', avi: '🎬', mkv: '🎬', webm: '🎬',
        mp3: '🎵', wav: '🎵', flac: '🎵', aac: '🎵', m4a: '🎵',
        pdf: '📄', doc: '📝', docx: '📝', txt: '📝', md: '📝',
        xls: '📊', xlsx: '📊', csv: '📊',
        ppt: '📊', pptx: '📊',
        zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
        js: '💾', ts: '💾', py: '💾', html: '💾', css: '💾', json: '💾',
      };
      return map[ext] || '📄';
    }

    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── File list ─────────────────────────────────────────────────────────────

    async function loadFiles() {
      const res = await fetch('/api/files');
      if (res.status === 401) { location.href = '/login'; return; }
      if (!res.ok) {
        document.getElementById('fileList').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load files (${res.status}). Check your R2 binding in the Cloudflare dashboard.</p></div>`;
        return;
      }
      const files = await res.json();

      const list = document.getElementById('fileList');
      const count = document.getElementById('fileCount');

      count.textContent = files.length === 0 ? '' : `${files.length} file${files.length !== 1 ? 's' : ''}`;

      if (files.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🗂️</div>
            <p>No files yet. Upload something above!</p>
          </div>`;
        return;
      }

      list.innerHTML = files.map(f => `
        <div class="file-item" id="fi-${CSS.escape(f.name)}">
          <div class="file-icon">${fileIcon(f.name)}</div>
          <div class="file-info">
            <div class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</div>
            <div class="file-meta">${formatSize(f.size)} · ${formatDate(f.modified)}</div>
          </div>
          <div class="file-actions">
            <button class="btn-action btn-download" onclick="downloadFile(${escHtml(JSON.stringify(f.name))})">
              ⬇ Download
            </button>
            <button class="btn-action btn-delete" onclick="deleteFile(${escHtml(JSON.stringify(f.name))}, this)">
              🗑 Delete
            </button>
          </div>
        </div>`).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Download ──────────────────────────────────────────────────────────────

    function downloadFile(name) {
      const a = document.createElement('a');
      a.href = `/api/download/${encodeURIComponent(name)}`;
      a.download = name;
      a.click();
    }

    // ── Delete ────────────────────────────────────────────────────────────────

    async function deleteFile(name, btn) {
      if (!confirm(`Delete "${name}"?`)) return;
      btn.disabled = true;
      try {
        const res = await fetch(`/api/files/${encodeURIComponent(name)}`, { method: 'DELETE' });
        if (res.ok) {
          showToast(`"${name}" deleted`);
          loadFiles();
        } else {
          showToast('Delete failed');
          btn.disabled = false;
        }
      } catch {
        showToast('Network error');
        btn.disabled = false;
      }
    }

    // ── Upload ────────────────────────────────────────────────────────────────

    function setProgress(pct, label) {
      document.getElementById('progressWrap').classList.toggle('visible', pct !== null);
      if (pct !== null) {
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = label || 'Uploading…';
      }
    }

    async function uploadFiles(files) {
      if (!files || files.length === 0) return;
      const form = new FormData();
      for (const f of files) form.append('files', f);

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            setProgress(pct, `Uploading… ${pct}%`);
          }
        });

        xhr.addEventListener('load', () => {
          setProgress(null);
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            showToast(`✓ Uploaded ${data.uploaded.length} file${data.uploaded.length !== 1 ? 's' : ''}`);
            loadFiles();
            resolve(data);
          } else {
            const err = JSON.parse(xhr.responseText);
            showToast('Upload failed: ' + (err.error || xhr.status));
            reject(new Error(err.error));
          }
        });

        xhr.addEventListener('error', () => {
          setProgress(null);
          showToast('Network error during upload');
          reject(new Error('Network error'));
        });

        xhr.open('POST', '/api/upload');
        xhr.send(form);
      });
    }

    // ── Drag & drop ───────────────────────────────────────────────────────────

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', (e) => {
      if (e.target.id === 'browseBtn' || dropZone.contains(e.target)) {
        fileInput.click();
      }
    });

    fileInput.addEventListener('change', () => {
      uploadFiles(fileInput.files).finally(() => { fileInput.value = ''; });
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', e => {
      if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      uploadFiles(e.dataTransfer.files);
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    loadFiles();
  </script>
</body>
</html>
